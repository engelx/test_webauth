<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox: WebAuthn & SMS Handler</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen p-4 md:p-8">
    
    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- Módulo WebAuthn -->
        <div class="bg-gray-900 border border-gray-800 rounded-lg p-6 flex flex-col h-full shadow-lg">
            <div class="mb-4 border-b border-gray-800 pb-2">
                <h2 class="text-xl font-mono text-blue-400">navigator.credentials</h2>
                <p class="text-xs text-gray-500 mt-1">Prueba de aserción y registro local</p>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="execRegister()" class="bg-gray-800 hover:bg-gray-700 border border-gray-700 text-sm font-semibold py-2 px-4 rounded transition-colors text-gray-200">
                    Crear Credencial
                </button>
                <button onclick="execAuth()" class="bg-gray-800 hover:bg-gray-700 border border-gray-700 text-sm font-semibold py-2 px-4 rounded transition-colors text-gray-200">
                    Solicitar Aserción
                </button>
            </div>

            <div class="flex-grow flex flex-col">
                <span class="text-xs text-gray-500 mb-1 font-mono">Consola WebAuthn</span>
                <pre id="wa-console" class="bg-black border border-gray-800 rounded p-3 text-xs font-mono text-green-400 overflow-x-auto flex-grow min-h-[200px] whitespace-pre-wrap">Esperando ejecución...</pre>
            </div>
        </div>

        <!-- Módulo SMS -->
        <div class="bg-gray-900 border border-gray-800 rounded-lg p-6 flex flex-col h-full shadow-lg">
            <div class="mb-4 border-b border-gray-800 pb-2">
                <h2 class="text-xl font-mono text-purple-400">URI Scheme: sms:</h2>
                <p class="text-xs text-gray-500 mt-1">Bypass de CSP con delegación nativa</p>
            </div>
            
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-xs font-mono mb-1 text-gray-400">Parámetro: Destino</label>
                    <input type="tel" id="sms-target" oninput="compileUri()" class="w-full bg-black border border-gray-800 rounded p-2 text-sm text-gray-200 focus:border-purple-500 outline-none" placeholder="+584120000000">
                </div>
                <div>
                    <label class="block text-xs font-mono mb-1 text-gray-400">Parámetro: ?body=</label>
                    <textarea id="sms-body" oninput="compileUri()" class="w-full bg-black border border-gray-800 rounded p-2 text-sm text-gray-200 focus:border-purple-500 outline-none h-24 resize-none" placeholder="Carga útil del mensaje"></textarea>
                </div>
            </div>

            <div class="flex-grow flex flex-col justify-end">
                <div class="bg-black border border-gray-800 rounded p-2 mb-3">
                    <span class="text-xs text-gray-500 block mb-1">URI Generado:</span>
                    <code id="uri-output" class="text-xs text-purple-300 break-all">sms:?body=</code>
                </div>
                
                <a id="sms-trigger" href="sms:?body=" target="_top" class="block text-center w-full bg-purple-900/50 hover:bg-purple-800/80 border border-purple-800 text-purple-200 font-bold py-3 rounded transition-colors opacity-50 pointer-events-none">
                    Llamar Intent Nativo
                </a>
            </div>
        </div>

    </div>

    <script>
        // --- Lógica de Consola ---
        const waConsole = document.getElementById('wa-console');
        function logWA(obj, isError = false) {
            waConsole.className = `bg-black border border-gray-800 rounded p-3 text-xs font-mono overflow-x-auto flex-grow min-h-[200px] whitespace-pre-wrap ${isError ? 'text-red-400' : 'text-green-400'}`;
            const timestamp = new Date().toISOString().split('T')[1].slice(0, -1);
            
            let output;
            if (obj instanceof Error) {
                output = obj.toString();
            } else if (typeof obj === 'object') {
                // Serializar ArrayBuffers para visibilidad
                const serialized = JSON.stringify(obj, (key, value) => {
                    if (value instanceof ArrayBuffer) return `ArrayBuffer(${value.byteLength})`;
                    return value;
                }, 2);
                output = serialized;
            } else {
                output = String(obj);
            }
            
            waConsole.textContent = `[${timestamp}] ${output}`;
        }

        // --- Lógica WebAuthn ---
        let testCredentialId = null;
        const generateRandomBuffer = (length = 32) => crypto.getRandomValues(new Uint8Array(length));

        async function execRegister() {
            try {
                if (!window.PublicKeyCredential) throw new Error("WebAuthn API no soportada.");
                
                logWA("Iniciando creación de credencial...");
                const options = {
                    challenge: generateRandomBuffer(32),
                    rp: { name: "Sandbox", id: window.location.hostname || "localhost" },
                    user: {
                        id: generateRandomBuffer(16),
                        name: "test@sandbox.local",
                        displayName: "Test User"
                    },
                    pubKeyCredParams: [{alg: -7, type: "public-key"}],
                    authenticatorSelection: { userVerification: "preferred" },
                    timeout: 60000
                };

                const credential = await navigator.credentials.create({ publicKey: options });
                testCredentialId = credential.rawId;
                
                logWA({
                    status: "Credencial creada",
                    id: credential.id,
                    type: credential.type,
                    rawId: credential.rawId
                });
            } catch (err) {
                logWA(err, true);
            }
        }

        async function execAuth() {
            try {
                if (!testCredentialId) throw new Error("No hay credencial en memoria. Ejecuta 'Crear Credencial' primero.");
                
                logWA("Iniciando solicitud de aserción...");
                const options = {
                    challenge: generateRandomBuffer(32),
                    allowCredentials: [{ id: testCredentialId, type: 'public-key' }],
                    userVerification: "preferred",
                    timeout: 60000
                };

                const assertion = await navigator.credentials.get({ publicKey: options });
                
                logWA({
                    status: "Aserción validada",
                    id: assertion.id,
                    authenticatorData: assertion.response.authenticatorData,
                    signature: assertion.response.signature
                });
            } catch (err) {
                logWA(err, true);
            }
        }

        // --- Lógica SMS Handler ---
        function compileUri() {
            const target = document.getElementById('sms-target').value.replace(/\s+/g, '');
            const body = document.getElementById('sms-body').value;
            const trigger = document.getElementById('sms-trigger');
            const output = document.getElementById('uri-output');
            
            const encodedBody = encodeURIComponent(body);
            const uri = `sms:${target}?body=${encodedBody}`;
            
            output.textContent = uri;
            trigger.href = uri;

            if (target.length > 2 || body.length > 0) {
                trigger.classList.remove('opacity-50', 'pointer-events-none');
            } else {
                trigger.classList.add('opacity-50', 'pointer-events-none');
            }
        }
    </script>
</body>
</html>
